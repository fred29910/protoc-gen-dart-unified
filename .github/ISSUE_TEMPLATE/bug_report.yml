name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      description: Which version of protoc-gen-dart-unified are you using?
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: dart-version
    attributes:
      label: Dart SDK Version
      description: What Dart SDK version are you using?
      placeholder: "3.10.0"
    validations:
      required: true
  - type: textarea
    id: proto
    attributes:
      label: Proto File (if applicable)
      description: If the bug is related to code generation, please provide the relevant .proto file.
      render: protobuf
  - type: textarea
    id: generated
    attributes:
      label: Generated Code (if applicable)
      description: If the bug is related to generated code, please provide the relevant output.
      render: dart
  - type: textarea
    id: logs
    attributes:
      label: Logs/Error Messages
      description: Any relevant logs, error messages, or stack traces.
      render: text
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information about the problem.